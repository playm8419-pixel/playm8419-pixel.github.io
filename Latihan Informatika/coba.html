<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Chess Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(8, 60px);
            grid-template-rows: repeat(8, 60px);
            border: 2px solid #000;
        }
        .cell {
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            position: relative;
        }
        .white {
            background-color: #eee;
        }
        .black {
            background-color: #333;
            color: #fff;
        }
        .piece {
            cursor: grab;
        }
        .highlight {
            background-color: yellow;
        }
    </style>
</head>
<body>
    <div class="board" id="chessBoard"></div>

    <script>
        const board = document.getElementById('chessBoard');

        // Initial chessboard setup
        const initialBoard = [
            ['R', 'N', 'B', 'Q', 'K', 'B', 'N', 'R'],
            ['P', 'P', 'P', 'P', 'P', 'P', 'P', 'P'],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['p', 'p', 'p', 'p', 'p', 'p', 'p', 'p'],
            ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r']
        ];

        let currentPlayer = 'white';

        function createBoard() {
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.classList.add((row + col) % 2 === 0 ? 'white' : 'black');
                    cell.dataset.row = row;
                    cell.dataset.col = col;

                    const piece = initialBoard[row][col];
                    if (piece) {
                        const pieceElement = document.createElement('span');
                        pieceElement.textContent = piece;
                        pieceElement.classList.add('piece');
                        pieceElement.draggable = true;
                        pieceElement.dataset.row = row;
                        pieceElement.dataset.col = col;
                        pieceElement.dataset.color = row < 2 ? 'white' : 'black';
                        cell.appendChild(pieceElement);
                    }

                    board.appendChild(cell);
                }
            }
        }

        function highlightMoves(row, col, piece, color) {
            const possibleMoves = [];

            switch (piece.toLowerCase()) {
                case 'p': { // Pawn movement
                    const direction = color === 'white' ? -1 : 1;
                    const nextRow = parseInt(row) + direction;
                    if (nextRow >= 0 && nextRow < 8) {
                        possibleMoves.push({ row: nextRow, col: parseInt(col) });
                    }
                    break;
                }
                case 'r': { // Rook movement
                    for (let i = 0; i < 8; i++) {
                        if (i !== parseInt(row)) possibleMoves.push({ row: i, col: parseInt(col) });
                        if (i !== parseInt(col)) possibleMoves.push({ row: parseInt(row), col: i });
                    }
                    break;
                }
                case 'n': { // Knight movement
                    const knightMoves = [
                        { row: -2, col: -1 }, { row: -2, col: 1 },
                        { row: -1, col: -2 }, { row: -1, col: 2 },
                        { row: 1, col: -2 }, { row: 1, col: 2 },
                        { row: 2, col: -1 }, { row: 2, col: 1 }
                    ];
                    knightMoves.forEach(move => {
                        const newRow = parseInt(row) + move.row;
                        const newCol = parseInt(col) + move.col;
                        if (newRow >= 0 && newRow < 8 && newCol >= 0 && newCol < 8) {
                            possibleMoves.push({ row: newRow, col: newCol });
                        }
                    });
                    break;
                }
                case 'b': { // Bishop movement
                    for (let i = 1; i < 8; i++) {
                        if (parseInt(row) + i < 8 && parseInt(col) + i < 8) possibleMoves.push({ row: parseInt(row) + i, col: parseInt(col) + i });
                        if (parseInt(row) - i >= 0 && parseInt(col) + i < 8) possibleMoves.push({ row: parseInt(row) - i, col: parseInt(col) + i });
                        if (parseInt(row) + i < 8 && parseInt(col) - i >= 0) possibleMoves.push({ row: parseInt(row) + i, col: parseInt(col) - i });
                        if (parseInt(row) - i >= 0 && parseInt(col) - i >= 0) possibleMoves.push({ row: parseInt(row) - i, col: parseInt(col) - i });
                    }
                    break;
                }
                case 'q': { // Queen movement
                    for (let i = 0; i < 8; i++) {
                        if (i !== parseInt(row)) possibleMoves.push({ row: i, col: parseInt(col) });
                        if (i !== parseInt(col)) possibleMoves.push({ row: parseInt(row), col: i });
                    }
                    for (let i = 1; i < 8; i++) {
                        if (parseInt(row) + i < 8 && parseInt(col) + i < 8) possibleMoves.push({ row: parseInt(row) + i, col: parseInt(col) + i });
                        if (parseInt(row) - i >= 0 && parseInt(col) + i < 8) possibleMoves.push({ row: parseInt(row) - i, col: parseInt(col) + i });
                        if (parseInt(row) + i < 8 && parseInt(col) - i >= 0) possibleMoves.push({ row: parseInt(row) + i, col: parseInt(col) - i });
                        if (parseInt(row) - i >= 0 && parseInt(col) - i >= 0) possibleMoves.push({ row: parseInt(row) - i, col: parseInt(col) - i });
                    }
                    break;
                }
                case 'k': { // King movement
                    const kingMoves = [
                        { row: -1, col: -1 }, { row: -1, col: 0 }, { row: -1, col: 1 },
                        { row: 0, col: -1 }, { row: 0, col: 1 },
                        { row: 1, col: -1 }, { row: 1, col: 0 }, { row: 1, col: 1 }
                    ];
                    kingMoves.forEach(move => {
                        const newRow = parseInt(row) + move.row;
                        const newCol = parseInt(col) + move.col;
                        if (newRow >= 0 && newRow < 8 && newCol >= 0 && newCol < 8) {
                            possibleMoves.push({ row: newRow, col: newCol });
                        }
                    });
                    break;
                }
            }

            possibleMoves.forEach(move => {
                const targetCell = document.querySelector(
                    `.cell[data-row='${move.row}'][data-col='${move.col}']`
                );
                if (targetCell) {
                    targetCell.classList.add('highlight');
                }
            });
        }

        function clearHighlights() {
            document.querySelectorAll('.highlight').forEach(cell => {
                cell.classList.remove('highlight');
            });
        }

                if (e.target.classList.contains('piece')) {
                    draggedPiece =
