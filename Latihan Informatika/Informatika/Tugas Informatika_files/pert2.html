  <style>
    .grid {
      width: 100vw;
      height: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 1em;
      justify-content: center;
    }

    .grid-card {
      border: 1px solid black;
      padding: 10px;
      width: 200px;
      height: 320px; /* Tinggi ditambah sedikit */
      display: flex;
      flex-direction: column;
      align-items: center;
      box-sizing: border-box;
    }

    .grid-card img {
      width: 180px; /* Lebar tetap sesuai kartu */
      height: 180px; /* Tinggi tetap */
      object-fit: cover; /* Potong gambar yang berlebih */
      object-position: center top; /* Fokus pada bagian atas (wajah) */
      margin-bottom: 10px;
    }

    .grid-card h1 {
      margin: 5px 0;
      font-size: 1.2em;
      text-align: center;
    }

    .grid-card p {
      margin: 0;
      font-size: 0.9em;
      text-align: center;
    }
  </style>
